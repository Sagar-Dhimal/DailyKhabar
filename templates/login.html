{% extends "base.html" %}

{% block title %}Login - Daily Khabar{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Sign In</h4>
            </div>
            <div class="card-body p-4">
                <ul class="nav nav-tabs mb-4" id="loginTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link {% if tab != 'admin' %}active{% endif %}" id="user-tab" data-bs-toggle="tab" data-bs-target="#user-login" type="button" role="tab">Reader Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link {% if tab == 'admin' %}active{% endif %}" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin-login" type="button" role="tab">Staff Access</button>
                    </li>
                </ul>

                <div class="tab-content" id="loginTabsContent">
                    <!-- User Login -->
                    <div class="tab-pane fade {% if tab != 'admin' %}show active{% endif %}" id="user-login" role="tabpanel">
                        <form id="userLoginForm" action="{{ url_for('login') }}" method="POST" novalidate>
                            <input type="hidden" name="next" value="{{ next }}">
                            <input type="hidden" name="login_type" value="user">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" id="username" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" id="password" class="form-control" required>
                                </div>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">Login</button>
                            </div>
                            <p class="text-center small mb-0">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
                        </form>
                    </div>

                    <!-- Admin Login -->
                    <div class="tab-pane fade {% if tab == 'admin' %}show active{% endif %}" id="admin-login" role="tabpanel">
                        <div class="alert alert-warning small mb-4">
                            <i class="bi bi-shield-lock"></i> Admin panel is for authorized staff members only.
                        </div>
                        <form id="adminLoginForm" action="{{ url_for('login') }}" method="POST" novalidate>
                            <input type="hidden" name="next" value="{{ next }}">
                            <input type="hidden" name="login_type" value="admin">
                            <div class="mb-3">
                                <label for="admin_username" class="form-label fw-bold">Admin ID</label>
                                <input type="text" name="username" id="admin_username" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label for="admin_password" class="form-label fw-bold">Security Key</label>
                                <input type="password" name="password" id="admin_password" class="form-control" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark">Access Console</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const forms = document.querySelectorAll('form');
    forms.forEach(form => {
        form.addEventListener('submit', function(event) {
            const inputs = form.querySelectorAll('input[required]');
            let valid = true;
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.add('is-invalid');
                    valid = false;
                } else {
                    input.classList.remove('is-invalid');
                    input.classList.add('is-valid');
                }
            });
            if (!valid) {
                event.preventDefault();
                event.stopPropagation();
            }
        });
    });
});
</script>
{% endblock %}
